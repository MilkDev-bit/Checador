name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./backend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.20'
        # Tip: Esto acelera futuras ejecuciones guardando las dependencias
        cache: true
        cache-dependency-path: backend/go.sum

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v ./...
